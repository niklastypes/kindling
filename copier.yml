_min_copier_version: "9.0"
_subdirectory: project
_templates_suffix: .jinja
_exclude:
  - .git
  - __pycache__
  - .ruff_cache
  - .ty

_skip_if_exists:
  - AGENTS.md
  - README.md
  - LICENSE
  - .gitignore

# --- Questions ---

project_name:
  type: str
  help: "Project name in kebab-case (lowercase letters, digits, single hyphens, e.g. my-project)"
  validator: >-
    {% if not project_name %}
    Project name is required.
    {% elif not project_name | regex_search('^[a-z][a-z0-9]*(-[a-z0-9]+)*$') %}
    Project name must be kebab-case: lowercase letters, digits, and single hyphens (e.g. my-project).
    {% endif %}

project_description:
  type: str
  help: "One-line project description"
  default: "A Python project, kindled with Kindling"

author_name:
  type: str
  help: "Author name for pyproject.toml and LICENSE"
  validator: "{% if not author_name %}Author name is required{% endif %}"

github_username:
  type: str
  help: "GitHub username or org (used for project URLs)"
  validator: "{% if not github_username %}GitHub username is required{% endif %}"

python_version:
  type: str
  help: "Python version"
  choices:
    - "3.13"
    - "3.12"
  default: "3.13"

# --- Tasks ---

_tasks:
  - "[ ! -d .git ] && git init && (git config user.email >/dev/null 2>&1 || git config user.email 'kindled@local') && (git config user.name >/dev/null 2>&1 || git config user.name 'Kindling') && git add . && git commit -m 'feat: initial commit kindled with 🪵 Kindling' && git tag v0.1.0 || true"

# --- Computed (not shown to user) ---

package_name:
  type: str
  default: "{{ project_name | replace('-', '_') }}"
  when: false
