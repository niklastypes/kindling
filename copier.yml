_min_copier_version: "9.0"
_subdirectory: project
_templates_suffix: .jinja
_exclude:
  - .git
  - __pycache__
  - .ruff_cache
  - .ty
  # Python-only mode: exclude full-stack files
  - "{% if not full_stack %}/api/{% endif %}"
  - "{% if not full_stack %}/ui/{% endif %}"
  - "{% if not full_stack %}nx.json{% endif %}"
  - "{% if not full_stack %}/package.json{% endif %}"
  - "{% if not full_stack %}pnpm-workspace.yaml{% endif %}"
  - "{% if not full_stack %}tsconfig.base.json{% endif %}"
  # Full-stack mode: exclude root-level Python files (they live in api/)
  - "{% if full_stack %}/src/{% endif %}"
  - "{% if full_stack %}/tests/{% endif %}"
  - "{% if full_stack %}/pyproject.toml{% endif %}"
  - "{% if full_stack %}/.python-version{% endif %}"
  - "{% if full_stack %}/.env.example{% endif %}"
  # Docs: only generate feature-specific guides when opted in
  - "{% if not full_stack %}/docs/full-stack.md{% endif %}"
  # GitHub PM: exclude PM files when not enabled
  - "{% if not enable_github_pm %}/scripts/{% endif %}"
  - "{% if not enable_github_pm %}/docs/project-management.md{% endif %}"
  - "{% if not enable_github_pm %}/.github/ISSUE_TEMPLATE/{% endif %}"
  - "{% if not enable_github_pm %}/.github/pull_request_template.md{% endif %}"

_skip_if_exists:
  - AGENTS.md
  - CLAUDE.md
  - README.md
  - LICENSE
  - .gitignore
  - docs/full-stack.md
  - docs/productionalize.md
  - docs/architecture.md
  - docs/decisions/0000-template.md
  - docs/project-management.md

# --- Questions ---

project_name:
  type: str
  help: "Project name in kebab-case (lowercase letters, digits, single hyphens, e.g. my-project)"
  default: "{{ _copier_conf.dst_path.name }}"
  validator: >-
    {% if not project_name %}
    Project name is required.
    {% elif not project_name | regex_search('^[a-z][a-z0-9]*(-[a-z0-9]+)*$') %}
    Project name must be kebab-case: lowercase letters, digits, and single hyphens (e.g. my-project).
    {% endif %}

project_description:
  type: str
  help: "One-line project description"
  default: "A Python project, kindled with Kindling"

author_name:
  type: str
  help: "Author name for pyproject.toml and LICENSE"
  validator: "{% if not author_name %}Author name is required{% endif %}"

github_username:
  type: str
  help: "GitHub username or org (used for project URLs)"
  validator: "{% if not github_username %}GitHub username is required{% endif %}"

python_version:
  type: str
  help: "Python version"
  choices:
    - "3.13"
    - "3.12"
  default: "3.13"

full_stack:
  type: bool
  help: "Scaffold a full-stack app (Vue 3 + FastAPI + Nx monorepo)?"
  default: false

enable_github_pm:
  type: bool
  help: "Set up GitHub Project Management (Project board, issue templates, labels)?"
  default: false

# --- Tasks ---

_tasks:
  - >-
    [ ! -d .git ] &&
    git init &&
    (git config user.email >/dev/null 2>&1 || git config user.email 'kindled@local') &&
    (git config user.name >/dev/null 2>&1 || git config user.name 'Kindling') &&
    ({% if full_stack %}cd api && {% endif %}uv sync || true) &&
    {% if full_stack %}(pnpm install || true) && {% endif %}
    git add . &&
    git commit -m 'feat: initial commit kindled with 🪵 Kindling' &&
    git tag v0.1.0 || true
  # Preserve the user's Glossary entries when re-running `copier update`.
  # No-op on initial copy (git HEAD has no prior version of the file).
  - |
    {% raw %}python3 - << 'PYEOF'
    import re
    import subprocess
    import sys
    from pathlib import Path

    FILE = Path("docs/ubiquitous-language.md")
    BEGIN = "<!-- KINDLING:GLOSSARY:BEGIN -->"
    END = "<!-- KINDLING:GLOSSARY:END -->"

    if not FILE.exists():
        sys.exit(0)

    try:
        old = subprocess.run(
            ["git", "show", f"HEAD:{FILE}"],
            capture_output=True, text=True, check=True,
        ).stdout
    except (subprocess.CalledProcessError, FileNotFoundError):
        sys.exit(0)

    pattern = re.compile(re.escape(BEGIN) + r"(.*?)" + re.escape(END), re.DOTALL)
    old_match = pattern.search(old)
    new = FILE.read_text()
    new_match = pattern.search(new)

    if not old_match or not new_match:
        sys.exit(0)

    merged = new[:new_match.start()] + old_match.group(0) + new[new_match.end():]
    FILE.write_text(merged)
    PYEOF{% endraw %}

# --- Computed (not shown to user) ---

package_name:
  type: str
  default: "{{ project_name | replace('-', '_') }}"
  when: false
